<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Add a new course to your personal course organizer.">
    <title>Add New Course - Course Organizer</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">📚 CourseHub</a>
            <button class="hamburger" id="hamburger-btn" aria-label="Toggle navigation menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-menu" id="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="my-courses.html">My Courses</a></li>
                <li><a href="add-course.html" class="active">Add Course</a></li>
                <li><a href="contact-us.html">Contact Us</a></li>
            </ul>
        </nav>
        <div class="nav-overlay" id="nav-overlay"></div>
    </header>

    <main>
        <div class="form-container">
            <h2 class="page-title">Add New Course</h2>
            
            <form action="#" method="post">
                <div class="form-group">
                    <label for="course-name">Course Name</label>
                    <input type="text" id="course-name" placeholder="e.g. Data Structures" required>
                </div>
                
                <div class="form-group">
                    <label for="instructor">Instructor</label>
                    <input type="text" id="instructor" placeholder="e.g. Dr. Ahmed" required>
                </div>
                
                <div class="form-group">
                    <label for="credit-hours">Credit Hours</label>
                    <input type="number" id="credit-hours" placeholder="e.g. 3" min="1" max="6" required>
                </div>
                
                <div class="form-group">
                    <label for="notes">Notes</label>
                    <textarea id="notes" rows="5" placeholder="Any additional notes about the course..."></textarea>
                </div>
                
                <button type="submit" class="submit-btn">Add Course</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 - Personal Course Organizer | Made by arwa 💕</p>
    </footer>

    <script>
        // Hamburger Menu Toggle
        const hamburger = document.getElementById('hamburger-btn');
        const navMenu = document.getElementById('nav-menu');
        const navOverlay = document.getElementById('nav-overlay');

        function toggleMenu() {
            hamburger.classList.toggle('active');
            navMenu.classList.toggle('active');
            navOverlay.classList.toggle('active');
            document.body.style.overflow = navMenu.classList.contains('active') ? 'hidden' : '';
        }

        hamburger.addEventListener('click', toggleMenu);
        navOverlay.addEventListener('click', toggleMenu);

        document.querySelectorAll('.nav-menu a').forEach(link => {
            link.addEventListener('click', () => {
                if (navMenu.classList.contains('active')) toggleMenu();
            });
        });

        window.addEventListener('resize', () => {
            if (window.innerWidth > 768 && navMenu.classList.contains('active')) {
                toggleMenu();
            }
        });
    </script>
</body>
</html>
